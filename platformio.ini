; PlatformIO project for LilyGo T-Display-S3 AMOLED (ESP32-S3R8, 1.91" RM67162 536x240)
; Internet radio -> I2S amp (NS4168 / MAX98357A compatible)

[env:t-display-s3-amoled]
platform = espressif32@6.12.0
board = lilygo-t-display-s3
framework = arduino
monitor_speed = 115200

; 16MB flash / 8MB OPI PSRAM
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    esphome/ESP32-audioI2S @ ^2.3.0
    moononournation/GFX Library for Arduino @ 1.4.9
